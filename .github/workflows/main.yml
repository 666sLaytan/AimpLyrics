name: Build AimpLyrics

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019

    steps:
    - uses: actions/checkout@v4

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore Packages
      run: nuget restore AimpLyrics/AimpLyrics.sln

    - name: Build
      run: msbuild AimpLyrics/AimpLyrics.sln /p:Configuration=Release

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AimpLyrics
        path: AimpLyrics/AimpLyrics/bin/Release/
